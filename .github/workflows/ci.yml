name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyDUMMYDUMMYDUMMYDUMMYDUMMYDUMMY
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy-ci.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy-ci-project
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy-ci-project.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "123456789012"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:123456789012:web:abcdef1234567890abcdef"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm run lint
